kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

# Development only. In production the SPA's web service runs this same server
# bundle as the single dynamic origin (serving /api + the SPA + per-route
# social meta), so the API server is not deployed as a separate service.
# See artifacts/cwsite/.replit-artifact/artifact.toml [services.production].

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"
