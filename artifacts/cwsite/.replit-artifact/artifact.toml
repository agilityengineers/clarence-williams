kind = "web"
previewPath = "/"
title = "Clarence Williams Consulting"
version = "1.0.0"
id = "artifacts/cwsite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18686

[services.development]
run = "pnpm --filter @workspace/cwsite run dev"

# Production serves the SPA through the API server bundle so social
# link-preview crawlers get per-route Open Graph/Twitter meta (see
# artifacts/api-server/src/client-serving.ts). This is the single dynamic
# production origin: it serves /api, the built static assets, and the
# meta-injected HTML. The build produces both the SPA and the server bundle.
[services.production.build]
args = ["sh", "-c", "pnpm --filter @workspace/cwsite run build && pnpm --filter @workspace/api-server run build"]

# SITE_URL is the canonical domain. It must be present at BUILD time (bakes
# absolute Open Graph URLs + robots.txt Sitemap into the static output) and
# at RUN time (drives canonical <link>, sitemap, and the canonical-host 301
# redirect). Setting it here activates the single-domain SEO behavior.
[services.production.build.env]
NODE_ENV = "production"
SITE_URL = "https://clarencewilliams.com"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
NODE_ENV = "production"
PORT = "18686"
SITE_URL = "https://clarencewilliams.com"

[services.production.health.startup]
path = "/api/healthz"

[services.env]
PORT = "18686"
BASE_PATH = "/"
