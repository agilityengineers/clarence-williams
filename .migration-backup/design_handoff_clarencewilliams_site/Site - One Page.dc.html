<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/logo-gold.png">
<style> body { margin: 0; background: #0B1626; } html { scroll-behavior: smooth; } </style>
</helmet>

<div style="width: 1920px; background: #0B1626; font-family: 'Archivo', sans-serif; display: flex; flex-direction: column;" data-screen-label="One-Page Site">

  <!-- Sticky site nav -->
  <div style="position: sticky; top: 0; z-index: 20; background: #0B1626; border-bottom: 1px solid #2A3B52; display: flex; justify-content: space-between; align-items: center; padding: 18px 100px;">
    <div style="display: flex; align-items: center; gap: 20px;">
      <img src="assets/logo-gold.png" alt="Clarence Williams monogram" style="height: 36px; width: 36px; display: block;">
      <span style="font-size: 14px; letter-spacing: 0.24em; color: #EDE6D6; font-weight: 600;">CLARENCE WILLIAMS</span>
      <span style="font-size: 12px; letter-spacing: 0.22em; color: #7C8AA0;">BUSINESS STRATEGY &amp; AGILE TRANSFORMATIONS</span>
    </div>
    <div style="display: flex; align-items: center; gap: 36px; font-size: 13px; letter-spacing: 0.16em; font-weight: 500;">
      <a href="#services" style="color: #A9B4C6; text-decoration: none;">SERVICES</a>
      <a href="#story" style="color: #A9B4C6; text-decoration: none;">THE PLAN</a>
      <a href="#about" style="color: #A9B4C6; text-decoration: none;">ABOUT</a>
      <a href="#proof" style="color: #A9B4C6; text-decoration: none;">RESULTS</a>
      <a href="#book" style="background: #C9A24B; color: #0B1626; padding: 12px 24px; text-decoration: none; font-weight: 600;">BOOK A CALL</a>
    </div>
  </div>

  <dc-import name="Hero Section" hint-size="1920px,1080px"></dc-import>

  <sc-if value="{{ showServices }}" hint-placeholder-val="{{ true }}">
    <dc-import name="Section Services" hint-size="1920px,900px"></dc-import>
  </sc-if>
  <sc-if value="{{ showStory }}" hint-placeholder-val="{{ true }}">
    <dc-import name="Section Story" hint-size="1920px,700px"></dc-import>
  </sc-if>
  <sc-if value="{{ showAbout }}" hint-placeholder-val="{{ true }}">
    <dc-import name="Section About" hint-size="1920px,900px"></dc-import>
  </sc-if>
  <sc-if value="{{ showProof }}" hint-placeholder-val="{{ true }}">
    <dc-import name="Section Proof" hint-size="1920px,900px"></dc-import>
  </sc-if>
  <sc-if value="{{ showVentures }}" hint-placeholder-val="{{ true }}">
    <dc-import name="Section Ventures" hint-size="1920px,400px"></dc-import>
  </sc-if>
  <sc-if value="{{ showInsights }}" hint-placeholder-val="{{ true }}">
    <dc-import name="Section Insights" article-count="{{ insightsCount }}" layout="{{ insightsLayout }}" hint-size="1920px,700px"></dc-import>
  </sc-if>
  <sc-if value="{{ showBookCall }}" hint-placeholder-val="{{ true }}">
    <dc-import name="Section BookCall" hint-size="1920px,900px"></dc-import>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;showServices&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Admin — Sections&quot; },
  &quot;showStory&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Admin — Sections&quot; },
  &quot;showAbout&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Admin — Sections&quot; },
  &quot;showProof&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Admin — Sections&quot; },
  &quot;showVentures&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Admin — Sections&quot; },
  &quot;showInsights&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Admin — Sections&quot; },
  &quot;showBookCall&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Admin — Sections&quot; },
  &quot;insightsCount&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 3, &quot;min&quot;: 1, &quot;max&quot;: 9, &quot;step&quot;: 1, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Admin — Insights Feed&quot; },
  &quot;insightsLayout&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Editorial List&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;Editorial List&quot;, &quot;Card Grid&quot;, &quot;Feature + List&quot;], &quot;section&quot;: &quot;Admin — Insights Feed&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    return {
      showServices: this.props.showServices ?? true,
      showStory: this.props.showStory ?? true,
      showAbout: this.props.showAbout ?? true,
      showProof: this.props.showProof ?? true,
      showVentures: this.props.showVentures ?? true,
      showInsights: this.props.showInsights ?? true,
      insightsCount: this.props.insightsCount ?? 3,
      insightsLayout: this.props.insightsLayout ?? 'Editorial List',
      showBookCall: this.props.showBookCall ?? true
    };
  }
}
</script>
</body>
</html>
